<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATIF Replay · open local trajectory</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
<style>
:root {
  --bg: #fcfcfc;
  --panel: #ffffff;
  --panel-soft: #fafafa;
  --panel-muted: #f7f7f8;
  --border: #ededee;
  --border-strong: #e4e4e7;
  --text: #111111;
  --text-soft: #52525b;
  --text-faint: #71717a;
  --text-subtle: #a1a1aa;
  --accent: #111111;
  --accent-soft: #f4f4f5;
  --code-bg: #fafafa;
  --shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
  --shadow-strong: 0 14px 30px rgba(15, 23, 42, 0.06);
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --mono: 'SF Mono', 'Cascadia Code', Consolas, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
}

body {
  display: flex;
  flex-direction: column;
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.6;
}

button,
input {
  font: inherit;
}

header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  background: rgba(255, 255, 255, 0.94);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
  min-height: 60px;
}

.brand-lockup {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.brand {
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--text);
  white-space: nowrap;
  text-transform: uppercase;
}

.brand-subtitle {
  color: var(--text-faint);
  font-size: 11px;
}

.session-meta {
  font-size: 12px;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.session-meta em {
  font-style: normal;
  color: var(--text);
}

.session-meta-key {
  color: var(--text-faint);
}

.session-meta-separator {
  color: var(--text-subtle);
  margin: 0 0.28rem;
}

.controls {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  flex-shrink: 0;
  flex-wrap: wrap;
}

#file-input { display: none; }

#filter-input {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 999px;
  font-size: 12px;
  width: 210px;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

#filter-input:focus {
  border-color: #a1a1aa;
  box-shadow: 0 0 0 4px rgba(24, 24, 27, 0.06);
}

#filter-input::placeholder {
  color: var(--text-subtle);
}

.ctrl-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text-soft);
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease, opacity 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
}

.ctrl-btn:hover  {
  background: var(--panel-soft);
  color: var(--text);
  border-color: var(--border-strong);
  box-shadow: 0 6px 14px rgba(15, 23, 42, 0.04);
}

.ctrl-btn:active { transform: translateY(1px); }

.ctrl-btn.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #ffffff;
}

.ctrl-btn:disabled,
.ctrl-btn.disabled {
  opacity: 0.45;
  cursor: not-allowed;
  box-shadow: none;
}

#app {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

#app.metrics-hidden {
  grid-template-columns: minmax(0, 1fr);
}

#conversation {
  overflow-y: auto;
  padding: 24px 20px 30px;
  background: var(--bg);
  scrollbar-width: none;
  -ms-overflow-style: none;
}

#conversation.dragging {
  background: #f4f4f5;
}

#sidebar {
  border-left: 1px solid var(--border);
  background: #fbfbfb;
  overflow-y: auto;
  padding: 18px 16px 22px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

#app.metrics-hidden #sidebar {
  display: none;
}

#sidebar-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chain-inner {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
  padding-left: 24px;
}

.chain-inner::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: linear-gradient(180deg, #d4d4d8, #efefef);
}

.r-user   { color: #0f766e; }
.r-agent  { color: #166534; }
.r-system { color: #92400e; }
.r-tool   { color: #5b21b6; }

.step-node {
  position: relative;
  margin-bottom: 14px;
  scroll-margin-top: 88px;
}

.step-node::before {
  content: '';
  position: absolute;
  left: -22px;
  top: 18px;
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: #ffffff;
  border: 2px solid #27272a;
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.95);
}

.step-node.role-user::before { border-color: #0f766e; }
.step-node.role-agent::before { border-color: #166534; }
.step-node.role-system::before { border-color: #92400e; }
.step-node.role-tool::before { border-color: #5b21b6; }

.step-node.is-target .node-shell {
  border-color: #111111;
  box-shadow: 0 0 0 1px rgba(17, 17, 17, 0.08), var(--shadow-strong);
}

.step-node.flash .node-shell {
  animation: step-flash 1.35s ease;
}

@keyframes step-flash {
  0%   { box-shadow: 0 0 0 0 rgba(17, 17, 17, 0.16), var(--shadow-strong); }
  35%  { box-shadow: 0 0 0 8px rgba(17, 17, 17, 0.05), var(--shadow-strong); }
  100% { box-shadow: var(--shadow-strong); }
}

.node-shell {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.node-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  padding: 13px 14px 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff 0%, #fdfdfd 100%);
}

.node-title {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px 10px;
  min-width: 0;
  font-family: var(--mono);
}

.node-step {
  color: var(--text-faint);
  font-size: 11px;
}

.node-role {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.node-preview {
  color: var(--text-soft);
  font-size: 11px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 58ch;
}

.node-timestamp {
  color: var(--text-subtle);
  font-family: var(--mono);
  font-size: 10px;
}

.node-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}

.node-action {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text-soft);
  border-radius: 999px;
  padding: 4px 9px;
  font-size: 10px;
  cursor: pointer;
  font-family: var(--mono);
  transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
}

.node-action:hover {
  background: var(--accent-soft);
  color: var(--text);
  border-color: var(--border-strong);
}

.node-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-family: var(--mono);
}

.step-node.collapsed .node-body {
  display: none;
}

.event-block {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--panel-soft);
  padding: 10px 12px;
}

.event-heading {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.event-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.event-ref {
  color: var(--text-subtle);
  font-size: 10px;
}

.event-body,
.event-snippet,
.json-detail pre,
.node-json pre {
  line-height: 1.6;
}

.event-body { color: var(--text); }
.event-body.system { color: #92400e; }
.event-body.user { color: #134e4a; }
.event-body.agent { color: #14532d; }
.event-body.tool { color: #4c1d95; }

.event-block.reasoning {
  border-left: 3px solid #d4d4d8;
  background: #fafafa;
}

.event-block.reasoning .event-body {
  color: var(--text-soft);
  font-style: italic;
}

.event-block.tool-call {
  border-left: 3px solid #27272a;
}

.event-block.tool-result {
  border-left: 3px solid #71717a;
}

.event-summary-line {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: baseline;
  color: var(--text-soft);
}

.symbol-tool,
.symbol-result,
.tool-name {
  color: var(--text);
}

.tool-name { font-weight: 700; }
.tool-paren { color: var(--text-faint); }

.event-snippet {
  color: var(--text-soft);
  margin-top: 8px;
}

.json-detail,
.node-json {
  margin-top: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: #ffffff;
  overflow: hidden;
}

.json-detail summary,
.node-json summary {
  cursor: pointer;
  list-style: none;
  padding: 10px 12px;
  color: var(--text-soft);
  font-size: 12px;
  user-select: none;
}

.json-detail summary::-webkit-details-marker,
.node-json summary::-webkit-details-marker { display: none; }

.json-detail summary::before,
.node-json summary::before {
  content: '▸';
  display: inline-block;
  margin-right: 8px;
  transition: transform 0.12s ease;
}

.json-detail[open] summary::before,
.node-json[open] summary::before {
  transform: rotate(90deg);
}

.json-detail pre,
.node-json pre {
  padding: 0 12px 12px;
  color: var(--text);
}

.event-block.metrics {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  color: var(--text-soft);
}

.metrics-pairs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.metrics-key { color: var(--text-faint); }
.metrics-val { color: var(--text); }

.sidebar-panel {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--panel);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.sidebar-panel-head {
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff 0%, #fdfdfd 100%);
}

.sidebar-eyebrow {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.sidebar-title {
  margin-top: 4px;
  font-size: 14px;
  line-height: 1.3;
  color: var(--text);
}

.sidebar-copy {
  margin-top: 6px;
  color: var(--text-soft);
  font-size: 12px;
  line-height: 1.65;
}

.analytics-panel {
  display: flex;
  flex-direction: column;
}

.analytics-subtitle {
  color: var(--text-soft);
  font-size: 11px;
  margin-top: 6px;
}

.analytics-body {
  padding: 12px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.analytics-summary {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.analytics-summary-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: start;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel-soft);
  padding: 10px 12px;
}

.analytics-summary-main {
  min-width: 0;
}

.analytics-summary-label {
  color: var(--text-faint);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.analytics-summary-value {
  color: var(--text);
  font-size: 14px;
  line-height: 1.3;
  font-weight: 700;
  text-align: right;
  white-space: nowrap;
}

.analytics-summary-meta {
  margin-top: 4px;
  color: var(--text-soft);
  font-size: 11px;
  line-height: 1.55;
}

.analytics-sections {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.analytics-section {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel-soft);
  padding: 12px;
}

.analytics-section h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  margin-bottom: 8px;
}

.analytics-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.analytics-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
}

.analytics-row-main {
  min-width: 0;
}

.analytics-row-label {
  display: flex;
  gap: 6px;
  align-items: baseline;
  min-width: 0;
}

.analytics-row-label strong {
  color: var(--text);
  font-size: 11px;
}

.analytics-row-label span {
  color: var(--text-faint);
  font-size: 10px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.analytics-row-value {
  color: var(--text);
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.analytics-bar {
  margin-top: 5px;
  height: 4px;
  border-radius: 999px;
  overflow: hidden;
  background: #ececee;
}

.analytics-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #d4d4d8, #71717a);
}

.analytics-empty {
  color: var(--text-faint);
  font-size: 11px;
}

.code-block {
  margin-top: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--code-bg);
  overflow: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.code-block::-webkit-scrollbar {
  width: 0;
  height: 0;
}

.code-syntax,
.hljs {
  display: block;
  padding: 12px 13px 13px;
  min-width: max-content;
  background: transparent !important;
  color: #111111;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.65;
}

.hljs-comment,
.hljs-quote {
  color: #6b7280;
}

.hljs-keyword,
.hljs-selector-tag,
.hljs-literal,
.hljs-title,
.hljs-section,
.hljs-doctag {
  color: #c2410c;
}

.hljs-string,
.hljs-attr,
.hljs-template-variable {
  color: #15803d;
}

.hljs-number,
.hljs-type,
.hljs-symbol,
.hljs-bullet {
  color: #7c3aed;
}

.hljs-property,
.hljs-built_in,
.hljs-variable,
.hljs-selector-id,
.hljs-selector-class {
  color: #1d4ed8;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  min-height: calc(100vh - 220px);
  color: var(--text-soft);
  font-size: 14px;
  text-align: center;
  border: 1px dashed var(--border-strong);
  border-radius: 24px;
  background: #ffffff;
  padding: 48px 32px;
  box-shadow: var(--shadow);
}

.empty-state strong {
  color: var(--text);
  font-size: 22px;
  font-weight: 700;
}

.empty-state p {
  max-width: 580px;
  line-height: 1.7;
}

.empty-state .empty-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.inline-error {
  margin-bottom: 16px;
  padding: 12px 14px;
  border: 1px solid #fecaca;
  background: #fef2f2;
  border-radius: 14px;
  color: #b91c1c;
  white-space: pre-wrap;
}

#raw-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(17, 17, 17, 0.28);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

#raw-modal.open { display: flex; }

#raw-pane {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 18px;
  width: min(960px, 88vw);
  max-height: 82vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 28px 70px rgba(15, 23, 42, 0.16);
}

#raw-pane-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-soft);
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

#close-raw {
  background: none;
  border: none;
  color: var(--text-faint);
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.1s ease;
}

#close-raw:hover { color: var(--text); }

#raw-content {
  overflow: auto;
  padding: 0;
  flex: 1;
  line-height: 1.6;
  background: var(--code-bg);
  scrollbar-width: none;
  -ms-overflow-style: none;
}

#conversation::-webkit-scrollbar,
#sidebar::-webkit-scrollbar,
#raw-content::-webkit-scrollbar {
  width: 0;
  height: 0;
}

@media (max-width: 1100px) {
  #app {
    grid-template-columns: minmax(0, 1fr) 300px;
  }
}

@media (max-width: 920px) {
  html, body {
    overflow: auto;
  }

  body {
    min-height: 100%;
  }

  header {
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .controls {
    width: 100%;
    margin-left: 0;
  }

  #filter-input {
    flex: 1 1 180px;
  }

  #app,
  #app.metrics-hidden {
    grid-template-columns: minmax(0, 1fr);
    overflow: visible;
  }

  #conversation,
  #sidebar {
    overflow: visible;
  }

  #sidebar {
    border-left: none;
    border-top: 1px solid var(--border);
  }

  .node-header {
    flex-direction: column;
  }

  .node-actions {
    justify-content: flex-start;
  }
}

/* --- Category filter chips --- */
.category-filters {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: center;
}

.cat-filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text-soft);
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
}

.cat-filter-chip:hover {
  background: var(--panel-soft);
  border-color: var(--border-strong);
}

.cat-filter-chip.active {
  background: var(--cat-color, #111);
  border-color: var(--cat-color, #111);
  color: #ffffff;
}

.cat-filter-chip.active .cat-dot {
  background: #ffffff !important;
}

.cat-filter-clear {
  color: var(--text-faint);
  font-size: 10px;
}

.cat-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  flex-shrink: 0;
}

/* --- Settings panel --- */
.settings-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 14px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.settings-category {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel-soft);
  padding: 10px 12px;
}

.settings-cat-heading {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  margin-bottom: 8px;
}

.settings-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}

.settings-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-family: var(--mono);
}

.chip-remove {
  background: none;
  border: none;
  color: var(--text-faint);
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.1s ease;
}

.chip-remove:hover {
  color: #dc2626;
}

.settings-add-row {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.settings-add-input {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-family: var(--mono);
  outline: none;
}

.settings-add-input:focus {
  border-color: #a1a1aa;
}

/* --- Analytics loop rows --- */
.analytics-loop-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding: 2px 0;
}

.analytics-loop-main {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

.analytics-loop-range {
  color: var(--text);
  font-size: 11px;
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 2px;
}

.analytics-loop-range:hover {
  color: #2563eb;
}

.analytics-loop-cat {
  color: var(--text-faint);
  font-size: 10px;
}

.analytics-loop-end {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.analytics-loop-len {
  color: var(--text-soft);
  font-size: 10px;
}

.analytics-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.badge-resolved {
  background: #dcfce7;
  color: #166534;
  border: 1px solid #bbf7d0;
}

.badge-unresolved {
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
}

/* --- Pastel category tags (turn attribution) --- */
.node-tags {
  display: inline-flex;
  gap: 4px;
  margin-left: 2px;
}

.node-cat-tag,
.tool-cat-tag {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--tag-color, #71717a);
  background: color-mix(in srgb, var(--tag-color, #71717a) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--tag-color, #71717a) 22%, transparent);
  white-space: nowrap;
  vertical-align: middle;
  line-height: 1.6;
}

.tool-cat-tag {
  margin-left: 6px;
  font-size: 8px;
  padding: 0 6px;
}

/* --- Tool call/result pairing --- */
.tool-pair {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin: 4px 0;
}

.tool-pair .event-block {
  border: none;
  border-radius: 0;
  margin: 0;
}

.tool-pair .event-block.tool-call {
  border-bottom: 1px dashed var(--border);
}

.tool-pair .event-block.tool-result {

}

/* --- Missing tool result indicator --- */
.tool-result-missing {

  gap: 6px;
  padding: 8px 14px;
  font-size: 11px;
  color: #b91c1c;
  background: #fef2f2;
  border-top: 1px dashed #fecaca;
}

.missing-icon {
  font-size: 14px;
}
